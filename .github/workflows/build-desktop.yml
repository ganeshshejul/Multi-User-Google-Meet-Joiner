name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-packaging.txt

      - name: Build app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name MultiUserGoogleMeetJoiner --collect-all selenium --collect-all webdriver_manager main.py

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/MultiUserGoogleMeetJoiner.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/MultiUserGoogleMeetJoiner.app" "dist/MultiUserGoogleMeetJoiner-macos.zip"
          else
            zip -r "dist/MultiUserGoogleMeetJoiner-macos.zip" "dist/MultiUserGoogleMeetJoiner"
          fi

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/MultiUserGoogleMeetJoiner/*" -DestinationPath "dist/MultiUserGoogleMeetJoiner-windows.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MultiUserGoogleMeetJoiner-${{ matrix.os }}
          path: dist/*.zip
